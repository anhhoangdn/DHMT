# Cấu hình mặc định cho DECA_DHMT
mediapipe:
  max_num_faces: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  static_image_mode: true

deca:
  root: "external/DECA"
  device: "cuda"  # hoặc "cpu"
  save_mesh: true
  save_texture: true
  save_rendered_image: true

output:
  landmarks_dir: "outputs/landmarks2d"
  meshes_dir: "outputs/meshes"
  textures_dir: "outputs/textures"
  renders_dir: "outputs/renders"
  videos_dir: "outputs/videos"

logging:
  level: "INFO"
  format: "[%(asctime)s] [%(levelname)s] %(message)s"
